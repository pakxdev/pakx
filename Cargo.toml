[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/arwenizEr/pakx"
homepage = "https://github.com/arwenizEr/pakx"
authors = ["pakx contributors"]
rust-version = "1.87"

[workspace.dependencies]
# CLI
clap = { version = "4.5", features = ["derive"] }
# Errors
anyhow = "1.0"
thiserror = "1.0"
# Serde
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# serde_yaml is archived; serde_yml is an actively maintained drop-in fork.
serde_yml = "0.0.12"
# Async + HTTP (used later by registry-client)
tokio = { version = "1.41", features = ["macros", "rt-multi-thread"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Validation
regex = "1.11"
# Internal crates
pakx-core = { path = "crates/pakx-core" }
pakx-agents = { path = "crates/pakx-agents" }
pakx-registry-client = { path = "crates/pakx-registry-client" }

[workspace.dependencies.assert_cmd]
version = "2.0"

[workspace.dependencies.predicates]
version = "3.1"

[workspace.lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# Pragmatic exclusions: pedantic/nursery contain stylistic noise unsuited to v0.1.
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
