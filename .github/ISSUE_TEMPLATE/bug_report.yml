name: Bug report
description: pakx misbehaved. Help us reproduce + fix.
title: "[bug] "
labels: ["kind/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please **do not** file security
        vulnerabilities here — use [the Security Advisory channel](https://github.com/pakxdev/pakx/security/advisories/new)
        instead.
  - type: input
    id: version
    attributes:
      label: pakx version
      description: Output of `pakx --version`.
      placeholder: pakx 0.1.1
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS + arch
      description: e.g. `macOS 14.6 / arm64`, `Ubuntu 24.04 / x86_64`, `Windows 11 / x86_64`.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproducer
      description: The smallest manifest / command / HTTP request that triggers the bug. Code blocks please.
      render: shell
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened
      description: Exact error message, stack trace, or wrong output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs (`RUST_LOG=debug pakx ...`), screenshots, related issues.
